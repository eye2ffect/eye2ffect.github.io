<!DOCTYPE html>
<html lang="ko">
<head>  
<meta charset="UTF-8">
    {% include head.html %}
</head>  
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-logo">{{ site.title }}</div>
        <div class="loading-bar-container">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
        <div class="loading-text">LOADING...</div>
    </div>

    <!-- Particle Background -->
    <canvas id="particle-canvas"></canvas>

    <!-- Ambient Glow -->
    <div class="ambient-glow" id="ambient-glow"></div>

    {% include nav.html %}

    {% include about.html %}

    {% include skills.html %}

    {% include education.html %}

    {% include projects.html %}

    {% include extra.html %}

    {% include footer.html %}

    <!-- Video Modal -->
    <div class="video-modal-overlay" id="video-modal">
        <div class="video-modal">
            <div class="video-modal-header">
                <span class="video-modal-title" id="video-modal-title">Demo</span>
                <button class="video-modal-close" onclick="closeVideoModal()">&times;</button>
            </div>
            <div class="video-modal-body" id="video-modal-body"></div>
        </div>
    </div>

    {% include scripts.html %}
</body>
</html>
