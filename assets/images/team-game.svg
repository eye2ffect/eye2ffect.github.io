<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1025"/>
      <stop offset="100%" style="stop-color:#151525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f06888"/>
      <stop offset="100%" style="stop-color:#9b6dff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- RPG UI Frame -->
  <g transform="translate(60, 40)">
    <!-- Character status panel -->
    <rect x="0" y="0" width="250" height="300" rx="12" fill="#1e1e32" stroke="#9b6dff" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="125" y="35" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#ededf5">WARRIOR</text>
    <line x1="20" y1="48" x2="230" y2="48" stroke="#9b6dff" stroke-opacity="0.2" stroke-width="1"/>
    <!-- Character silhouette -->
    <rect x="75" y="60" width="100" height="120" rx="10" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.15"/>
    <g transform="translate(125, 120)" fill="#5cc8e8" opacity="0.4">
      <circle cx="0" cy="-30" r="15"/>
      <rect x="-12" y="-12" width="24" height="35" rx="5"/>
      <rect x="-20" y="-5" width="8" height="25" rx="3"/>
      <rect x="12" y="-5" width="8" height="25" rx="3"/>
      <rect x="-10" y="23" width="8" height="22" rx="3"/>
      <rect x="2" y="23" width="8" height="22" rx="3"/>
    </g>
    <!-- HP Bar -->
    <text x="20" y="205" font-family="monospace" font-size="12" fill="#f06888" opacity="0.8">HP</text>
    <rect x="45" y="193" width="185" height="14" rx="4" fill="#252542"/>
    <rect x="45" y="193" width="140" height="14" rx="4" fill="#f06888" opacity="0.7"/>
    <text x="215" y="204" text-anchor="end" font-family="monospace" font-size="10" fill="#ededf5" opacity="0.6">280/375</text>
    <!-- MP Bar -->
    <text x="20" y="230" font-family="monospace" font-size="12" fill="#5cc8e8" opacity="0.8">MP</text>
    <rect x="45" y="218" width="185" height="14" rx="4" fill="#252542"/>
    <rect x="45" y="218" width="110" height="14" rx="4" fill="#5cc8e8" opacity="0.7"/>
    <text x="215" y="229" text-anchor="end" font-family="monospace" font-size="10" fill="#ededf5" opacity="0.6">120/200</text>
    <!-- Stats -->
    <text x="20" y="260" font-family="monospace" font-size="11" fill="#a0a0b8">ATK: 45  DEF: 32</text>
    <text x="20" y="280" font-family="monospace" font-size="11" fill="#a0a0b8">SPD: 28  LUK: 15</text>
  </g>
  <!-- Inventory Panel -->
  <g transform="translate(340, 40)">
    <rect x="0" y="0" width="400" height="200" rx="12" fill="#1e1e32" stroke="#5cc8e8" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="200" y="32" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#ededf5">INVENTORY</text>
    <line x1="15" y1="44" x2="385" y2="44" stroke="#5cc8e8" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Grid slots -->
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <text x="25" y="33" text-anchor="middle" font-size="22">⚔️</text>
      <rect x="60" y="0" width="50" height="50" rx="6" fill="#252542" stroke="#9b6dff" stroke-opacity="0.2"/>
      <text x="85" y="33" text-anchor="middle" font-size="22">🛡️</text>
      <rect x="120" y="0" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <text x="145" y="33" text-anchor="middle" font-size="22">🧪</text>
      <rect x="180" y="0" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <text x="205" y="33" text-anchor="middle" font-size="22">📜</text>
      <rect x="240" y="0" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <rect x="300" y="0" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <!-- Second row -->
      <rect x="0" y="60" width="50" height="50" rx="6" fill="#252542" stroke="#f06888" stroke-opacity="0.15"/>
      <text x="25" y="93" text-anchor="middle" font-size="22">💎</text>
      <rect x="60" y="60" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <text x="85" y="93" text-anchor="middle" font-size="22">🗝️</text>
      <rect x="120" y="60" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <rect x="180" y="60" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <rect x="240" y="60" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
      <rect x="300" y="60" width="50" height="50" rx="6" fill="#252542" stroke="#5cc8e8" stroke-opacity="0.1"/>
    </g>
  </g>
  <!-- Quest Log -->
  <g transform="translate(340, 260)">
    <rect x="0" y="0" width="400" height="80" rx="12" fill="#1e1e32" stroke="#fcd34d" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="18" y="28" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#fcd34d" opacity="0.8">📋 QUEST LOG</text>
    <text x="18" y="50" font-family="'Segoe UI', sans-serif" font-size="12" fill="#a0a0b8">▸ 마을 장로에게 보고하기</text>
    <text x="360" y="50" text-anchor="end" font-family="monospace" font-size="11" fill="#34d399">3/5</text>
    <text x="18" y="68" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6a6a82">▸ 숲속의 몬스터 처치</text>
    <text x="360" y="68" text-anchor="end" font-family="monospace" font-size="11" fill="#f06888">0/10</text>
  </g>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="600" fill="#9b6dff" opacity="0.5" letter-spacing="0.15em">TEAM RPG PROJECT</text>
</svg>
