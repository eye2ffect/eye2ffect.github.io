<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#150d25"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9b6dff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#9b6dff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#glow)"/>
  <!-- VR Headset outline -->
  <g transform="translate(400, 170)">
    <!-- Headset body -->
    <rect x="-120" y="-50" width="240" height="100" rx="20" fill="#1e1e32" stroke="#9b6dff" stroke-opacity="0.4" stroke-width="2"/>
    <!-- Left lens -->
    <circle cx="-45" cy="0" r="35" fill="#0a0a1a" stroke="#5cc8e8" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="-45" cy="0" r="28" fill="none" stroke="#5cc8e8" stroke-opacity="0.2" stroke-width="1"/>
    <!-- Right lens -->
    <circle cx="45" cy="0" r="35" fill="#0a0a1a" stroke="#5cc8e8" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="45" cy="0" r="28" fill="none" stroke="#5cc8e8" stroke-opacity="0.2" stroke-width="1"/>
    <!-- Nose bridge -->
    <path d="M-10 30 Q0 40 10 30" fill="none" stroke="#9b6dff" stroke-opacity="0.3" stroke-width="1"/>
    <!-- Lens reflections -->
    <circle cx="-55" cy="-10" r="8" fill="#5cc8e8" opacity="0.06"/>
    <circle cx="35" cy="-10" r="8" fill="#5cc8e8" opacity="0.06"/>
    <!-- Strap -->
    <path d="M-120 -15 Q-170 -30 -170 0 Q-170 30 -120 15" fill="none" stroke="#9b6dff" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M120 -15 Q170 -30 170 0 Q170 30 120 15" fill="none" stroke="#9b6dff" stroke-opacity="0.25" stroke-width="2"/>
    <!-- VR scene inside lenses -->
    <g opacity="0.3">
      <!-- Left lens scene -->
      <rect x="-68" y="-12" width="5" height="18" fill="#34d399" opacity="0.6"/>
      <rect x="-58" y="-18" width="5" height="24" fill="#5cc8e8" opacity="0.5"/>
      <rect x="-48" y="-8" width="5" height="14" fill="#fcd34d" opacity="0.5"/>
      <rect x="-38" y="-15" width="5" height="21" fill="#f06888" opacity="0.5"/>
      <rect x="-28" y="-10" width="5" height="16" fill="#9b6dff" opacity="0.5"/>
      <!-- Right lens scene -->
      <rect x="22" y="-12" width="5" height="18" fill="#34d399" opacity="0.6"/>
      <rect x="32" y="-18" width="5" height="24" fill="#5cc8e8" opacity="0.5"/>
      <rect x="42" y="-8" width="5" height="14" fill="#fcd34d" opacity="0.5"/>
      <rect x="52" y="-15" width="5" height="21" fill="#f06888" opacity="0.5"/>
      <rect x="62" y="-10" width="5" height="16" fill="#9b6dff" opacity="0.5"/>
    </g>
  </g>
  <!-- Hand controllers -->
  <!-- Left controller -->
  <g transform="translate(180, 300)">
    <rect x="-15" y="-30" width="30" height="55" rx="8" fill="#1e1e32" stroke="#5cc8e8" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="0" cy="-15" r="5" fill="#5cc8e8" opacity="0.4"/>
    <rect x="-6" y="0" width="12" height="4" rx="2" fill="#5cc8e8" opacity="0.3"/>
    <rect x="-6" y="8" width="12" height="4" rx="2" fill="#34d399" opacity="0.3"/>
    <!-- Tracking points -->
    <circle cx="-15" cy="-25" r="2" fill="#9b6dff" opacity="0.6"/>
    <circle cx="15" cy="-25" r="2" fill="#9b6dff" opacity="0.6"/>
    <circle cx="0" cy="-32" r="2" fill="#9b6dff" opacity="0.6"/>
  </g>
  <!-- Right controller -->
  <g transform="translate(620, 300)">
    <rect x="-15" y="-30" width="30" height="55" rx="8" fill="#1e1e32" stroke="#5cc8e8" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="0" cy="-15" r="5" fill="#f06888" opacity="0.4"/>
    <rect x="-6" y="0" width="12" height="4" rx="2" fill="#5cc8e8" opacity="0.3"/>
    <rect x="-6" y="8" width="12" height="4" rx="2" fill="#fcd34d" opacity="0.3"/>
    <circle cx="-15" cy="-25" r="2" fill="#9b6dff" opacity="0.6"/>
    <circle cx="15" cy="-25" r="2" fill="#9b6dff" opacity="0.6"/>
    <circle cx="0" cy="-32" r="2" fill="#9b6dff" opacity="0.6"/>
  </g>
  <!-- Tracking lines (dotted) -->
  <g stroke="#9b6dff" stroke-width="1" stroke-dasharray="3,5" opacity="0.2">
    <line x1="180" y1="268" x2="310" y2="170"/>
    <line x1="620" y1="268" x2="490" y2="170"/>
  </g>
  <!-- Interaction particles -->
  <g opacity="0.4">
    <circle cx="280" cy="260" r="2" fill="#5cc8e8"/>
    <circle cx="310" cy="250" r="1.5" fill="#9b6dff"/>
    <circle cx="260" cy="240" r="2.5" fill="#34d399"/>
    <circle cx="520" cy="260" r="2" fill="#5cc8e8"/>
    <circle cx="540" cy="245" r="1.5" fill="#f06888"/>
    <circle cx="500" cy="250" r="2.5" fill="#fcd34d"/>
  </g>
  <!-- SteamVR label -->
  <rect x="30" y="20" width="90" height="28" rx="6" fill="#9b6dff" opacity="0.12" stroke="#9b6dff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="75" y="39" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#9b6dff" opacity="0.8">SteamVR</text>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="600" fill="#9b6dff" opacity="0.5" letter-spacing="0.15em">VR INTERACTIVE EXPERIENCE</text>
</svg>
