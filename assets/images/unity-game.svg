<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cc8e8"/>
      <stop offset="100%" style="stop-color:#9b6dff"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cc8e8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9b6dff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#5cc8e8" stroke-width="0.5">
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="320" x2="800" y2="310"/>
    <line x1="0" y1="340" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="330"/>
    <line x1="0" y1="380" x2="800" y2="340"/>
    <line x1="100" y1="300" x2="100" y2="400"/>
    <line x1="200" y1="300" x2="250" y2="400"/>
    <line x1="300" y1="300" x2="400" y2="400"/>
    <line x1="400" y1="300" x2="550" y2="400"/>
    <line x1="500" y1="300" x2="700" y2="400"/>
    <line x1="600" y1="300" x2="800" y2="380"/>
    <line x1="700" y1="300" x2="800" y2="340"/>
  </g>
  <!-- 3D Platform blocks -->
  <g>
    <!-- Platform 1 -->
    <rect x="120" y="220" width="120" height="20" rx="3" fill="#5cc8e8" opacity="0.7"/>
    <rect x="120" y="220" width="120" height="20" rx="3" fill="url(#accent)" opacity="0.5"/>
    <rect x="130" y="240" width="120" height="10" rx="2" fill="#1a1a2e" opacity="0.6"/>
    <!-- Platform 2 -->
    <rect x="300" y="180" width="100" height="20" rx="3" fill="#9b6dff" opacity="0.6"/>
    <rect x="310" y="200" width="100" height="10" rx="2" fill="#1a1a2e" opacity="0.6"/>
    <!-- Platform 3 -->
    <rect x="460" y="150" width="130" height="20" rx="3" fill="#5cc8e8" opacity="0.5"/>
    <rect x="470" y="170" width="130" height="10" rx="2" fill="#1a1a2e" opacity="0.6"/>
    <!-- Platform 4 (goal) -->
    <rect x="640" y="120" width="100" height="20" rx="3" fill="#f0d34d" opacity="0.7"/>
    <rect x="650" y="140" width="100" height="10" rx="2" fill="#1a1a2e" opacity="0.6"/>
    <!-- Star on goal -->
    <polygon points="690,95 694,108 708,108 697,116 701,129 690,121 679,129 683,116 672,108 686,108" fill="#fcd34d" opacity="0.9"/>
  </g>
  <!-- Player character (simple cube person) -->
  <g transform="translate(155, 185)">
    <rect x="0" y="0" width="25" height="30" rx="4" fill="url(#accent)"/>
    <rect x="3" y="5" width="8" height="6" rx="2" fill="#1a1a2e"/>
    <rect x="14" y="5" width="8" height="6" rx="2" fill="#1a1a2e"/>
    <rect x="7" y="16" width="11" height="4" rx="1" fill="#1a1a2e"/>
  </g>
  <!-- Dotted jump path -->
  <g fill="#5cc8e8" opacity="0.4">
    <circle cx="220" cy="200" r="3"/>
    <circle cx="240" cy="190" r="3"/>
    <circle cx="260" cy="185" r="3"/>
    <circle cx="280" cy="183" r="3"/>
  </g>
  <!-- Coins -->
  <circle cx="330" cy="155" r="8" fill="#fcd34d" opacity="0.7"/>
  <circle cx="360" cy="155" r="8" fill="#fcd34d" opacity="0.7"/>
  <circle cx="500" cy="125" r="8" fill="#fcd34d" opacity="0.7"/>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="600" fill="#5cc8e8" opacity="0.6" letter-spacing="0.15em">3D PLATFORMER</text>
  <!-- Tech badge -->
  <rect x="30" y="20" width="70" height="28" rx="6" fill="#5cc8e8" opacity="0.12" stroke="#5cc8e8" stroke-opacity="0.25" stroke-width="1"/>
  <text x="65" y="39" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#5cc8e8" opacity="0.8">Unity</text>
</svg>
