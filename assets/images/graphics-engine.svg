<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cc8e8"/>
      <stop offset="100%" style="stop-color:#9b6dff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9b6dff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9b6dff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="200" fill="url(#glow)"/>
  <!-- Wireframe sphere (OpenGL style) -->
  <g transform="translate(400, 180)" fill="none" stroke="#5cc8e8" opacity="0.6">
    <!-- Horizontal rings -->
    <ellipse cx="0" cy="0" rx="100" ry="100" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="100" ry="35" stroke-width="0.8"/>
    <ellipse cx="0" cy="-30" rx="95" ry="25" stroke-width="0.6" opacity="0.5"/>
    <ellipse cx="0" cy="30" rx="95" ry="25" stroke-width="0.6" opacity="0.5"/>
    <ellipse cx="0" cy="-60" rx="80" ry="15" stroke-width="0.5" opacity="0.4"/>
    <ellipse cx="0" cy="60" rx="80" ry="15" stroke-width="0.5" opacity="0.4"/>
    <!-- Vertical rings -->
    <ellipse cx="0" cy="0" rx="35" ry="100" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="70" ry="100" stroke-width="0.6" opacity="0.5"/>
    <!-- Highlight vertices -->
    <circle cx="100" cy="0" r="3" fill="#5cc8e8" stroke="none"/>
    <circle cx="-100" cy="0" r="3" fill="#5cc8e8" stroke="none"/>
    <circle cx="0" cy="-100" r="3" fill="#9b6dff" stroke="none"/>
    <circle cx="0" cy="100" r="3" fill="#9b6dff" stroke="none"/>
    <circle cx="70" cy="-70" r="2.5" fill="#5cc8e8" stroke="none"/>
    <circle cx="-70" cy="-70" r="2.5" fill="#5cc8e8" stroke="none"/>
    <circle cx="70" cy="70" r="2.5" fill="#9b6dff" stroke="none"/>
    <circle cx="-70" cy="70" r="2.5" fill="#9b6dff" stroke="none"/>
  </g>
  <!-- Coordinate axes -->
  <g transform="translate(400, 180)" stroke-width="1.5">
    <line x1="0" y1="0" x2="140" y2="0" stroke="#f06888" opacity="0.5"/>
    <text x="148" y="4" font-family="monospace" font-size="13" fill="#f06888" opacity="0.6">X</text>
    <line x1="0" y1="0" x2="0" y2="-130" stroke="#34d399" opacity="0.5"/>
    <text x="4" y="-135" font-family="monospace" font-size="13" fill="#34d399" opacity="0.6">Y</text>
    <line x1="0" y1="0" x2="-80" y2="60" stroke="#5cc8e8" opacity="0.5"/>
    <text x="-95" y="72" font-family="monospace" font-size="13" fill="#5cc8e8" opacity="0.6">Z</text>
  </g>
  <!-- Shader code snippet decoration -->
  <g transform="translate(580, 60)" opacity="0.35">
    <text font-family="monospace" font-size="11" fill="#9b6dff">
      <tspan x="0" dy="0">void main() {</tspan>
      <tspan x="10" dy="16" fill="#5cc8e8">vec3 norm = normalize(Normal);</tspan>
      <tspan x="10" dy="16" fill="#34d399">vec3 lightDir = normalize(</tspan>
      <tspan x="20" dy="16" fill="#34d399">lightPos - FragPos);</tspan>
      <tspan x="10" dy="16" fill="#f06888">float diff = max(</tspan>
      <tspan x="20" dy="16" fill="#f06888">dot(norm, lightDir), 0.0);</tspan>
      <tspan x="10" dy="16" fill="#fcd34d">FragColor = vec4(</tspan>
      <tspan x="20" dy="16" fill="#fcd34d">result, 1.0);</tspan>
      <tspan x="0" dy="16">}</tspan>
    </text>
  </g>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="600" fill="#9b6dff" opacity="0.6" letter-spacing="0.15em">OPENGL RENDERING ENGINE</text>
  <!-- Tech badges -->
  <rect x="30" y="20" width="60" height="28" rx="6" fill="#9b6dff" opacity="0.12" stroke="#9b6dff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="60" y="39" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#9b6dff" opacity="0.8">C++</text>
  <rect x="100" y="20" width="75" height="28" rx="6" fill="#5cc8e8" opacity="0.12" stroke="#5cc8e8" stroke-opacity="0.25" stroke-width="1"/>
  <text x="137" y="39" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#5cc8e8" opacity="0.8">OpenGL</text>
</svg>
