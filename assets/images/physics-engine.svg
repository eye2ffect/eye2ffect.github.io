<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1520"/>
      <stop offset="100%" style="stop-color:#121828"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Physics simulation: colliding objects with vectors -->
  <!-- Ground line -->
  <line x1="50" y1="310" x2="750" y2="310" stroke="#454560" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Object A: Sphere -->
  <circle cx="250" cy="200" r="60" fill="none" stroke="#5cc8e8" stroke-width="2" opacity="0.6"/>
  <circle cx="250" cy="200" r="60" fill="#5cc8e8" opacity="0.04"/>
  <!-- Cross-section lines -->
  <ellipse cx="250" cy="200" rx="60" ry="20" fill="none" stroke="#5cc8e8" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="250" cy="200" rx="20" ry="60" fill="none" stroke="#5cc8e8" stroke-width="0.5" opacity="0.3"/>
  <text x="250" y="205" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#5cc8e8" opacity="0.7">A</text>
  <text x="250" y="280" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0b8">m=5.0 kg</text>
  <!-- Velocity vector A -->
  <line x1="310" y1="200" x2="390" y2="200" stroke="#34d399" stroke-width="2.5" opacity="0.7"/>
  <polygon points="390,193 405,200 390,207" fill="#34d399" opacity="0.7"/>
  <text x="355" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399" opacity="0.8">v₁ = 8 m/s</text>
  <!-- Object B: Box -->
  <rect x="440" y="160" width="80" height="80" rx="4" fill="none" stroke="#f06888" stroke-width="2" opacity="0.6"/>
  <rect x="440" y="160" width="80" height="80" rx="4" fill="#f06888" opacity="0.04"/>
  <line x1="440" y1="160" x2="480" y2="200" stroke="#f06888" stroke-width="0.5" opacity="0.3"/>
  <line x1="520" y1="160" x2="480" y2="200" stroke="#f06888" stroke-width="0.5" opacity="0.3"/>
  <line x1="440" y1="240" x2="480" y2="200" stroke="#f06888" stroke-width="0.5" opacity="0.3"/>
  <line x1="520" y1="240" x2="480" y2="200" stroke="#f06888" stroke-width="0.5" opacity="0.3"/>
  <text x="480" y="205" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#f06888" opacity="0.7">B</text>
  <text x="480" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0a0b8">m=3.0 kg</text>
  <!-- Velocity vector B -->
  <line x1="440" y1="200" x2="400" y2="200" stroke="#fcd34d" stroke-width="2.5" opacity="0.7"/>
  <polygon points="400,193 385,200 400,207" fill="#fcd34d" opacity="0.7"/>
  <text x="415" y="220" text-anchor="middle" font-family="monospace" font-size="11" fill="#fcd34d" opacity="0.8">v₂ = -3 m/s</text>
  <!-- Collision point indicator -->
  <g transform="translate(420, 200)">
    <circle cx="0" cy="0" r="12" fill="#fcd34d" opacity="0.1"/>
    <circle cx="0" cy="0" r="8" fill="#fcd34d" opacity="0.15"/>
    <circle cx="0" cy="0" r="4" fill="#fcd34d" opacity="0.3"/>
  </g>
  <!-- Formula panel -->
  <g transform="translate(560, 70)">
    <rect x="0" y="0" width="210" height="130" rx="10" fill="#1e1e32" stroke="#9b6dff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="105" y="25" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#9b6dff" opacity="0.8">Collision Response</text>
    <line x1="10" y1="34" x2="200" y2="34" stroke="#9b6dff" stroke-opacity="0.15"/>
    <text font-family="monospace" font-size="10" fill="#a0a0b8">
      <tspan x="15" dy="52">p = m·v</tspan>
      <tspan x="15" dy="18">F = dp/dt</tspan>
      <tspan x="15" dy="18" fill="#5cc8e8">e = -(v₂'-v₁')/(v₂-v₁)</tspan>
      <tspan x="15" dy="18" fill="#34d399">J = -(1+e)·v_rel / (1/m₁+1/m₂)</tspan>
    </text>
  </g>
  <!-- AABB/OBB debug wireframes -->
  <g opacity="0.2">
    <rect x="180" y="130" width="140" height="140" fill="none" stroke="#5cc8e8" stroke-dasharray="3,3"/>
    <rect x="430" y="150" width="100" height="100" fill="none" stroke="#f06888" stroke-dasharray="3,3"/>
    <text x="185" y="145" font-family="monospace" font-size="9" fill="#5cc8e8">AABB</text>
    <text x="435" y="165" font-family="monospace" font-size="9" fill="#f06888">AABB</text>
  </g>
  <!-- Contact normal -->
  <line x1="420" y1="200" x2="420" y2="130" stroke="#fcd34d" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="430" y="130" font-family="monospace" font-size="9" fill="#fcd34d" opacity="0.6">normal</text>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="600" fill="#34d399" opacity="0.5" letter-spacing="0.15em">3D PHYSICS ENGINE</text>
</svg>
